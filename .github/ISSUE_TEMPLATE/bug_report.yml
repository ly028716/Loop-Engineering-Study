name: Bug report
description: Report a reproducible problem in the runtime or experiments
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the observed behavior and the expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include the command, Python version, and smallest useful artifact or trace.
    validations:
      required: true
